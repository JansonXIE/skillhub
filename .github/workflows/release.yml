name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Update version from tag
        run: node scripts/update-version.cjs

      - name: Build Tauri app (NSIS + MSI)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Debug — list NSIS bundle output
        run: dir /s /b src-tauri\target\release\bundle\nsis\
        shell: cmd

      - name: Debug — list MSI bundle output
        run: dir /s /b src-tauri\target\release\bundle\msi\
        shell: cmd

      - name: Create NSIS updater zip (if missing)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $existingZip = Get-ChildItem -Path $nsisDir -Filter "*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $existingZip) {
            Write-Host "No .nsis.zip found, creating from installer exe..."
            $exe = Get-ChildItem -Path $nsisDir -Filter "*_x64-setup.exe" | Select-Object -First 1
            if (-not $exe) { throw "No NSIS installer exe found in $nsisDir" }
            $zipPath = Join-Path $nsisDir "$($exe.BaseName).nsis.zip"
            Write-Host "Compressing $($exe.Name) -> $($exe.BaseName).nsis.zip"
            Compress-Archive -LiteralPath $exe.FullName -DestinationPath $zipPath -CompressionLevel NoCompression
            Write-Host "Signing $zipPath with tauri signer..."
            npx tauri signer sign $zipPath
            if ($LASTEXITCODE -ne 0) { throw "tauri signer sign failed with exit code $LASTEXITCODE" }
            Write-Host "Updater artifacts created and signed successfully"
          } else {
            Write-Host "Using existing updater zip: $($existingZip.Name)"
          }

      - name: Generate latest.json manifest
        run: node scripts/generate-manifest.cjs

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            latest.json

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - name: Install dependencies
        run: npm ci

      - name: Update version from tag
        run: node scripts/update-version.cjs

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Debug — list DEB bundle output
        run: ls -la src-tauri/target/release/bundle/deb/

      - name: Debug — list AppImage bundle output
        run: ls -la src-tauri/target/release/bundle/appimage/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage